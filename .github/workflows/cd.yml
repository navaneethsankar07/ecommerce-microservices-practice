name: Microservices CD

on:
  workflow_run:
    workflows: ["Microservices CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: self-hosted

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build User Service
        run: docker build -f user-service/Dockerfile -t ${DOCKER_USERNAME}/user-service:latest user-service

      - name: Build Product Service
        run: docker build -f product-service/Dockerfile -t ${DOCKER_USERNAME}/product-service:latest product-service

      - name: Build Order Service
        run: docker build -f order-service/Dockerfile -t ${DOCKER_USERNAME}/order-service:latest order-service

      - name: Push User Image
        run: docker push ${DOCKER_USERNAME}/user-service:latest

      - name: Push Product Image
        run: docker push ${DOCKER_USERNAME}/product-service:latest

      - name: Push Order Image
        run: docker push ${DOCKER_USERNAME}/order-service:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy Kubernetes Resources
        run: |
          kubectl apply -R -f k8s/

      - name: Restart Deployments
        run: |
          kubectl rollout restart deployment/user-service
          kubectl rollout restart deployment/product-service
          kubectl rollout restart deployment/order-service

      - name: Wait for User Deployment
        id: user_rollout
        continue-on-error: true
        run: |
          kubectl rollout status deployment/user-service --timeout=120s
      
      - name: Rollback User Service
        if: steps.user_rollout.outcome == 'failure'
        run: |
          kubectl rollout undo deployment/user-service
          kubectl rollout status deployment/user-service --timeout=120s

      - name: Wait for Product Deployment
        id: product_rollout
        continue-on-error: true
        run: |
          kubectl rollout status deployment/product-service --timeout=120s

      - name: Rollback Product Service
        if: steps.product_rollout.outcome == 'failure'
        run: |
          kubectl rollout undo deployment/product-service
          kubectl rollout status deployment/product-service --timeout=120s

      - name: Wait for Order Deployment
        id: order_rollout
        continue-on-error: true
        run: |
          kubectl rollout status deployment/order-service --timeout=120s

      - name: Rollback Order Service
        if: steps.order_rollout.outcome == 'failure'
        run: |
          kubectl rollout undo deployment/order-service
          kubectl rollout status deployment/order-service --timeout=120s

      - name: Fail workflow if any rollback occurred
        if: steps.user_rollout.outcome == 'failure' || steps.product_rollout.outcome == 'failure' || steps.order_rollout.outcome == 'failure'
        run: |
          echo "One or more deployments failed. Rollback executed."
          exit 1