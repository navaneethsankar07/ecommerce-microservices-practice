name: Microservices CD

on:
  workflow_run:
    workflows: ["Microservices CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: self-hosted

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build User Service
        run: |
          docker build \
            -f user-service/Dockerfile \
            -t ${DOCKER_USERNAME}/user-service:${IMAGE_TAG} \
            user-service

      - name: Build Product Service
        run: |
          docker build \
            -f product-service/Dockerfile \
            -t ${DOCKER_USERNAME}/product-service:${IMAGE_TAG} \
            product-service

      - name: Build Order Service
        run: |
          docker build \
            -f order-service/Dockerfile \
            -t ${DOCKER_USERNAME}/order-service:${IMAGE_TAG} \
            order-service

      - name: Push User Image
        run: |
          docker push ${DOCKER_USERNAME}/user-service:${IMAGE_TAG}

      - name: Push Product Image
        run: |
          docker push ${DOCKER_USERNAME}/product-service:${IMAGE_TAG}

      - name: Push Order Image
        run: |
          docker push ${DOCKER_USERNAME}/order-service:${IMAGE_TAG}

      - name: Start Minikube
        run: |
          minikube start

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy Kubernetes Resources
        run: |
          kubectl apply -R -f k8s/

      - name: Update Deployment Images
        run: |
          kubectl set image deployment/user-service user-service=${DOCKER_USERNAME}/user-service:${IMAGE_TAG}
          kubectl set image deployment/product-service product-service=${DOCKER_USERNAME}/product-service:${IMAGE_TAG}
          kubectl set image deployment/order-service order-service=${DOCKER_USERNAME}/order-service:${IMAGE_TAG}

      - name: Verify deployment image
        run: |
          echo "IMAGE_TAG=${IMAGE_TAG}"

          kubectl get deployment user-service \
            -o=jsonpath='{.spec.template.spec.containers[0].image}'
          echo

          kubectl rollout history deployment/user-service

      - name: Wait for User Deployment
        id: user_rollout
        continue-on-error: true
        run: |
          kubectl rollout status deployment/user-service --timeout=300s

      - name: Rollback User Service
        if: steps.user_rollout.outcome == 'failure'
        run: |
          kubectl rollout undo deployment/user-service
          kubectl rollout status deployment/user-service --timeout=300s

      - name: Wait for Product Deployment
        id: product_rollout
        continue-on-error: true
        run: |
          kubectl rollout status deployment/product-service --timeout=300s

      - name: Rollback Product Service
        if: steps.product_rollout.outcome == 'failure'
        run: |
          kubectl rollout undo deployment/product-service
          kubectl rollout status deployment/product-service --timeout=300s

      - name: Wait for Order Deployment
        id: order_rollout
        continue-on-error: true
        run: |
          kubectl rollout status deployment/order-service --timeout=300s

      - name: Rollback Order Service
        if: steps.order_rollout.outcome == 'failure'
        run: |
          kubectl rollout undo deployment/order-service
          kubectl rollout status deployment/order-service --timeout=300s

      - name: Fail workflow if any rollback occurred
        if: steps.user_rollout.outcome == 'failure' || steps.product_rollout.outcome == 'failure' || steps.order_rollout.outcome == 'failure'
        run: |
          echo "One or more deployments failed. Rollback executed."
          exit 1