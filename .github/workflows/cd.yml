name: Microservices CD

on:
  workflow_run:
    workflows: ["Microservices CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify repository
        run: |
          pwd
          ls -la
          ls -la user-service
          ls -la product-service
          ls -la order-service

      - name: Check Docker username
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          echo "Username length: ${#DOCKER_USERNAME}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build User Service
        run: docker build -f user-service/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest user-service

      - name: Build Product Service
        run: docker build -f product-service/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/product-service:latest product-service

      - name: Build Order Service
        run: docker build -f order-service/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest order-service

      - name: Push User Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest

      - name: Push Product Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/product-service:latest

      - name: Push Order Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy Kubernetes Resources
        run: |
          kubectl apply -f k8s/

      - name: Restart Deployments
        run: |
          kubectl rollout restart deployment/user-service
          kubectl rollout restart deployment/product-service
          kubectl rollout restart deployment/order-service

      - name: Wait for User Deployment
        run: |
          kubectl rollout status deployment/user-service

      - name: Wait for Product Deployment
        run: |
          kubectl rollout status deployment/product-service

      - name: Wait for Order Deployment
        run: |
          kubectl rollout status deployment/order-service