apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:
      - name: order-service

        image: navaneethsankar7/user-service:placeholder

        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: django-secret
              key: SECRET_KEY

        - name: DB_NAME
          value: order_db

        - name: DB_USER
          value: postgres

        - name: DB_PASSWORD
          value: postgres

        - name: DB_HOST
          value: order-db

        - name: DB_PORT
          value: "5432"