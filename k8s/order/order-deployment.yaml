apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:
      - name: order-service

        image: order-service:v1

        imagePullPolicy: Never

        ports:
        - containerPort: 8000

        env:
        - name: DB_NAME
          value: order_db

        - name: DB_USER
          value: postgres

        - name: DB_PASSWORD
          value: postgres

        - name: DB_HOST
          value: order-db

        - name: DB_PORT
          value: "5432"
          