apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-db

spec:
  replicas: 1

  selector:
    matchLabels:
      app: order-db

  template:
    metadata:
      labels:
        app: order-db

    spec:
      containers:
      - name: postgres

        image: postgres:16

        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_DB
          value: order_db

        - name: POSTGRES_USER
          value: postgres

        - name: POSTGRES_PASSWORD
          value: postgres

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

      volumes:
      - name: postgres-storage

        persistentVolumeClaim:
          claimName: order-db-pvc